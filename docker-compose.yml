version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [gateway]
    networks: [public]

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-dev-secret-32-chars-minimum!!}
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      REQUEST_TIMEOUT_MS: 5000
      NODE_ENV: development
    networks: [public, internal]
    depends_on: [auth-service, user-service]

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-dev-secret-32-chars-minimum!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-refresh-secret-32-chars!!}
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: auth_db
      NODE_ENV: development
    networks: [internal]
    depends_on:
      auth-db:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    environment:
      PORT: 3002
      DB_HOST: users-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: users_db
      NODE_ENV: development
    networks: [internal]
    depends_on:
      users-db:
        condition: service_healthy

  # ── Отдельная БД для каждого сервиса ──────────────────────
  # Database-per-service — ключевой паттерн микросервисов
  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  users-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - users-db-data:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  public:
  internal:

volumes:
  auth-db-data:
  users-db-data:
